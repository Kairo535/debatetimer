class AudioManager {
    constructor() {
        this.ctx = null;
        this.enabled = true;
    }
    init() {
        if (!this.ctx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AudioContext();
        }
    }
    playTone(freq, type, duration, startTime = 0) {
        if (!this.enabled || !this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        const now = this.ctx.currentTime + startTime;
        osc.start(now);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
        osc.stop(now + duration);
    }
    play30s() { this.init(); this.playTone(880, 'sine', 0.2); }
    play15s() { this.init(); this.playTone(1174, 'sine', 0.2); setTimeout(()=>this.playTone(1174,'sine',0.2),250); }
    playTimeUp() { this.init(); this.playTone(440,'square',0.3); this.playTone(440,'square',0.3,0.7); this.playTone(440,'square',0.6,1.8); }
    test() { this.init(); this.play30s(); setTimeout(()=>this.play15s(),1000); setTimeout(()=>this.playTimeUp(),2500); }
}

<div class="card p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
<div class="flex justify-between items-center mb-4">
<h2 class="text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-list-check text-green-500"></i>${this.t('formatConfig')}</h2>
<select id="preset-select" onchange="app.loadPreset(this.value)" class="text-sm p-2 rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 outline-none">
<option value="">${this.t('selectTemplate')}</option>
<option value="xin-guo-bian">新国辩标准赛制</option>
<option value="oregon">奥瑞冈赛制</option>
<option value="bp">BP 赛制</option>
</select></div>
<div id="rounds-list" class="space-y-2 mb-4 max-h-60 overflow-y-auto pr-2"></div>
<button onclick="app.addRound()" class="w-full py-2 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg text-gray-500 hover:border-blue-500 hover:text-blue-500 transition flex items center justify-center gap-2">
<i class="fa-solid fa-plus"></i>${this.t('addRound')}</button></div>
<button onclick="app.startDebate()" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white text-xl font-bold rounded-xl shadow-lg transform active:scale-95 transition flex items-center justify-center gap-3">
<i class="fa-solid fa-play"></i>${this.t('startDebate')}</button>
<div class="text-center">
<button onclick="app.openModal('tutorial-modal')" class="text-sm text-gray-500 hover:text-blue-500 underline">${this.t('tutorial')}</button>
</div></div>`;
        this.renderRoundsList();
    },
    loadPreset(key){ if(!key||!PRESETS[key])return; this.state.rounds=JSON.parse(JSON.stringify(PRESETS[key])); this.renderRoundsList(); },
    renderRoundsList(){
        const l=document.getElementById('rounds-list');
        if(this.state.rounds.length===0){ l.innerHTML=`<div class="text-center text-gray-400 py-4 text-sm">${this.t('customFormat')}</div>`; return; }
        l.innerHTML=this.state.rounds.map((r,i)=>`
<div class="flex items-center gap-2 bg-gray-50 dark:bg-gray-800 p-2 rounded group">
<span class="text-xs font-mono text-gray-400 w-6 text-center">${i+1}</span>
<input type="text" value="${r.name}" onchange="app.updateRound(${i},'name',this.value)" class="flex-1 bg-transparent border-none text-sm focus:ring-0 p-0 dark:text-white">
<select onchange="app.updateRound(${i},'type',this.value)" class="text-xs bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded px-1 py-0.5">
<option value="speech" ${r.type==='speech'?'selected':''}>${this.t('typeSpeech')}</option>
<option value="cross-exam" ${r.type==='cross-exam'?'selected':''}>${this.t('typeCrossExam')}</option>
<option value="crossfire" ${r.type==='crossfire'?'selected':''}>${this.t('typeCrossfire')}</option>
<option value="free-debate" ${r.type==='free-debate'?'selected':''}>${this.t('typeFree')}</option>
<option value="other" ${r.type==='other'?'selected':''}>${this.t('typeOther')}</option>
</select>
<input type="number" value="${r.duration}" onchange="app.updateRound(${i},'duration',parseInt(this.value))" class="w-16 text-sm bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded px-1 py-0.5 text-right">
<span class="text-xs text-gray-500">s</span>
<button onclick="app.removeRound(${i})" class="text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition px-2">
<i class="fa-solid fa-trash"></i></button></div>`).join('');
    },
    addRound(){ this.state.rounds.push({name:this.t('round'),type:'speech',side:'pro',duration:180}); this.renderRoundsList();
        setTimeout(()=>{const l=document.getElementById('rounds-list'); l.scrollTop=l.scrollHeight;},50); },
    removeRound(i){ this.state.rounds.splice(i,1); this.renderRoundsList(); },
    updateRound(i,f,v){ this.state.rounds[i][f]=v; },
    startDebate(){
        this.state.proTeam=document.getElementById('input-pro').value||this.t('proSide');
        this.state.conTeam=document.getElementById('input-con').value||this.t('conSide');
        this.state.topic=document.getElementById('input-topic').value;
        if(this.state.rounds.length===0){ this.showToast('请至少添加一个环节','error'); return; }
        this.state.currentRoundIndex=0; this.state.isRunning=false; this.initRoundState(0);
        this.addToHistory(); this.renderTimer();
    },
    addToHistory(){
        const r={date:new Date().toISOString(),pro:this.state.proTeam,con:this.state.conTeam,topic:this.state.topic,rounds:this.state.rounds.length};
        this.state.history.unshift(r); if(this.state.history.length>20)this.state.history.pop(); this.saveState();
    },
    initRoundState(i){
        const r=this.state.rounds[i];
        this.state.roundState={proTime:r.duration,conTime:r.duration,activeSide:r.side==='con'?'con':'pro'};
        if(r.side==='con')this.state.roundState.activeSide='con';
        if(r.type==='other')this.state.roundState.activeSide='other';
    },
    renderTimer(){
        const c=document.getElementById('main-container');
        const r=this.state.rounds[this.state.currentRoundIndex];
        const t=this.getActiveTime();
        const total=r.duration;
        const p=Math.max(0,(t/total)*100);
        let tc='text-gray-800 dark:text-white';
        let bc='bg-blue-500';
        let bg='';
        if(t<=0){ tc='text-red-600 font-bold'; bc='bg-red-600'; bg='animate-flash-red'; }
        else if(t<=30){ tc='text-red-500'; bc='bg-red-500'; }
        else if(t<=60){ tc='text-yellow-600 dark:text-yellow-400'; bc='bg-yellow-500'; }
        const ipa=this.state.roundState.activeSide==='pro';
        const ica=this.state.roundState.activeSide==='con';
        const ib=r.type==='free-debate'||r.type==='crossfire';
        c.innerHTML=`<div id="timer-view" class="h-full flex flex-col ${bg}">
<div class="text-center mb-4 shrink-0">
<div class="inline-block px-3 py-1 bg-gray-200 dark:bg-gray-700 rounded-full text-xs font-bold text-gray-600 dark:text-gray-300 mb-2">
${this.t('round')} ${this.state.currentRoundIndex+1}/${this.state.rounds.length}</div>
<h2 class="text-xl md:text-2xl font-bold truncate px-4">${r.name}</h2>
<p class="text-sm text-gray-500 truncate px-4">${this.state.topic}</p></div>
<div class="flex-1 grid grid-cols-2 gap-4 px-4 min-h-0 mb-4">
<div class="card rounded-xl shadow-md flex flex-col items-center justify-center p-4 transition-all duration-300 border-2 ${ipa?'border-pro-500 bg-pro-50 dark:bg-pro-900/20 transform scale-105':'border-transparent opacity-60 grayscale'}">
<div class="text-pro-600 dark:text-pro-400 font-bold mb-1 text-sm uppercase tracking-wider">${this.t('proSide')}</div>
<div class="text-lg font-bold truncate w-full text-center mb-2">${this.state.proTeam}</div>
<div class="text-4xl md:text-5xl font-mono font-bold ${ipa?tc:'text-gray-400'}">${this.formatTime(this.state.roundState.proTime)}</div></div>
<div class="card rounded-xl shadow-md flex flex-col items-center justify-center p-4 transition-all duration-300 border-2 ${ica?'border-con-500 bg-con-50 dark:bg-con-900/20 transform scale-105':'border-transparent opacity-60 grayscale'}">
<div class="text-con-600 dark:text-con-400 font-bold mb-1 text-sm uppercase tracking-wider">${this.t('conSide')}</div>
<div class="text-lg font-bold truncate w-full text-center mb-2">${this.state.conTeam}</div>
<div class="text-4xl md:text-5xl font-mono font-bold ${ica?tc:'text-gray-400'}">${this.formatTime(this.state.roundState.conTime)}</div></div></div>
<div class="w-full h-3 bg-gray-200 dark:bg-gray-700 rounded-full mb-6 overflow-hidden px-4">
<div class="h-full ${bc} transition-all duration-1000 ease-linear" style="width:${p}%"></div></div>
<div class="px-4 pb-6 space-y-4 shrink-0">
<div class="flex justify-center gap-4">
<button onclick="app.prevRound()" class="w-14 h-14 rounded-full bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 flex items-center justify-center text-xl transition shadow-sm" ${this.state.currentRoundIndex===0?'disabled opacity-50':''}>
<i class="fa-solid fa-backward-step"></i></button>
<button onclick="app.toggleTimer()" class="w-20 h-20 rounded-full ${this.state.isRunning?'bg-yellow-500 hover:bg-yellow-600':'bg-green-500 hover:bg-green-600'} text-white text-3xl shadow-lg flex items-center justify-center transition transform active:scale-95">
<i class="fa-solid ${this.state.isRunning?'fa-pause':'fa-play'} pl-1"></i></button>
<button onclick="app.nextRound()" class="w-14 h-14 rounded-full bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 flex items-center justify-center text-xl transition shadow-sm" ${this.state.currentRoundIndex===this.state.rounds.length-1?'disabled opacity-50':''}>
<i class="fa-solid fa-forward-step"></i></button></div>
<div class="flex justify-between items-center px-4">
<button onclick="app.resetCurrentRound()" class="text-sm text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 flex items-center gap-1">
<i class="fa-solid fa-rotate-left"></i>${this.t('reset')}</button>
${ib?`<button onclick="app.switchSide()" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full font-bold shadow-md transition flex items-center gap-2 animate-pulse-fast">
<i class="fa-solid fa-arrow-right-arrow-left"></i>${this.t('switchSide')}</button>`:''}
<button onclick="app.openModal('confirm-modal')" class="text-sm text-red-500 hover:text-red-700 flex items-center gap-1">
<i class="fa-solid fa-stop"></i>${this.t('endDebate')}</button></div></div></div>`;
    },
    getActiveTime(){
        const s=this.state.roundState.activeSide;
        if(s==='pro')return this.state.roundState.proTime;
        if(s==='con')return this.state.roundState.conTime;
        return 0;
    },
    setActiveTime(v){
        const s=this.state.roundState.activeSide;
        if(s==='pro')this.state.roundState.proTime=v;
        if(s==='con')this.state.roundState.conTime=v;
    },
    formatTime(s){
        const m=Math.floor(s/60);
        const sc=Math.floor(s%60);
        return `${m.toString().padStart(2,'0')}:${sc.toString().padStart(2,'0')}`;
    },
    toggleTimer(){ this.state.isRunning?this.pauseTimer():this.startTimer(); },
    startTimer(){
        if(this.state.isRunning)return;
        this.audioManager.init();
        this.state.isRunning=true; this.renderTimer();
        this.state.timerInterval=setInterval(()=>{
            const r=this.state.rounds[this.state.currentRoundIndex];
            if(r.type!=='other'){
                let t=this.getActiveTime();
                if(t===30)this.audioManager.play30s();
                if(t===15)this.audioManager.play15s();
                if(t===0){ this.audioManager.playTimeUp(); this.state.isRunning=false; clearInterval(this.state.timerInterval); this.renderTimer(); return; }
                if(t>0)this.setActiveTime(t-1);
            }
            this.updateTimerDOM();
        },1000);
    },
    pauseTimer(){ this.state.isRunning=false; clearInterval(this.state.timerInterval); this.renderTimer(); },
    updateTimerDOM(){
        const t=this.getActiveTime();
        const r=this.state.rounds[this.state.currentRoundIndex];
        const total=r.duration;
        const p=Math.max(0,(t/total)*100);
        const d=document.querySelector(`.border-pro-500 .text-4xl, .border-con-500 .text-4xl`);
        if(d)d.innerText=this.formatTime(t);
        const b=document.querySelector('.h-full.transition-all');
        if(b)b.style.width=`${p}%`;
        if(t<=30&&t>0){
            if(b&&!b.classList.contains('bg-red-500')){
                b.classList.remove('bg-blue-500','bg-yellow-500'); b.classList.add('bg-red-500');
                if(d){d.classList.remove('text-gray-800','dark:text-white','text-yellow-600'); d.classList.add('text-red-500');}
            }
        }
    },
    resetCurrentRound(){ this.pauseTimer(); this.initRoundState(this.state.currentRoundIndex); this.renderTimer(); },
    switchSide(){
        const r=this.state.rounds[this.state.currentRoundIndex];
        if(r.type!=='free-debate'&&r.type!=='crossfire')return;
        this.state.roundState.activeSide=this.state.roundState.activeSide==='pro'?'con':'pro';
        this.renderTimer();
    },
    nextRound(){
        if(this.state.currentRoundIndex>=this.state.rounds.length-1)return;
        this.pauseTimer(); this.state.currentRoundIndex++; this.initRoundState(this.state.currentRoundIndex); this.renderTimer();
    },
    prevRound(){
        if(this.state.currentRoundIndex<=0)return;
        this.pauseTimer(); this.state.currentRoundIndex--; this.initRoundState(this.state.currentRoundIndex); this.renderTimer();
    },
    endDebateConfirmed(){ this.closeModal('confirm-modal'); this.pauseTimer(); this.renderSetup(); },
    showToast(msg,type='success'){
        const c=document.getElementById('toast-container');
        const to=document.createElement('div');
        const cc=type==='error'?'bg-red-500':'bg-green-500';
        const ic=type==='error'?'fa-circle-exclamation':'fa-circle-check';
        to.className=`${cc} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 transform translate-x-full transition-transform duration-300 pointer-events-auto`;
        to.innerHTML=`<i class="fa-solid ${ic}"></i><span>${msg}</span>`;
        c.appendChild(to);
        requestAnimationFrame(()=>{to.classList.remove('translate-x-full');});
        setTimeout(()=>{to.classList.add('translate-x-full'); setTimeout(()=>to.remove(),300);},3000);
    },
    openModal(id){
        const m=document.getElementById(id);
        m.classList.remove('hidden'); void m.offsetWidth;
        m.classList.remove('opacity-0');
        m.querySelector('div').classList.remove('scale-95');
        m.querySelector('div').classList.add('scale-100');
    },
    closeModal(id){
        const m=document.getElementById(id);
        m.classList.add('opacity-0');
        m.querySelector('div').classList.remove('scale-100');
        m.querySelector('div').classList.add('scale-95');
        setTimeout(()=>{m.classList.add('hidden');},300);
    },
    showSettings(){ this.renderHistory(); this.openModal('settings-modal'); },
    renderHistory(){
        const l=document.getElementById('history-list');
        if(this.state.history.length===0){ l.innerHTML=`<p class="text-gray-400 italic text-center py-2">${this.t('noHistory')}</p>`; return; }
        l.innerHTML=this.state.history.map(h=>`
<div class="flex justify-between items-center bg-white dark:bg-gray-800 p-2 rounded border border-gray-100 dark:border-gray-700">
<div class="truncate"><div class="font-bold text-xs">${h.pro} vs ${h.con}</div>
<div class="text-[10px] text-gray-500">${new Date(h.date).toLocaleString()}</div></div>
<div class="text-xs font-mono bg-gray-100 dark:bg-gray-700 px-1 rounded">${h.rounds} ${this.t('round')}</div></div>`).join('');
    },
    exportConfig(){
        const d={proTeam:this.state.proTeam,conTeam:this.state.conTeam,topic:this.state.topic,rounds:this.state.rounds,exportDate:new Date().toISOString()};
        const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
        const u=URL.createObjectURL(b);
        const a=document.createElement('a');
        a.href=u; a.download=`lunheng-config-${Date.now()}.json`; a.click();
        URL.revokeObjectURL(u); this.showToast(this.t('exported'));
    },
    importConfig(i){
        const f=i.files[0]; if(!f)return;
        const r=new FileReader();
        r.onload=e=>{
            try{
                const d=JSON.parse(e.target.result);
                if(d.rounds&&Array.isArray(d.rounds)){
                    this.state.proTeam=d.proTeam||this.t('proSide');
                    this.state.conTeam=d.conTeam||this.t('conSide');
                    this.state.topic=d.topic||'';
                    this.state.rounds=d.rounds;
                    if(document.getElementById('setup-view')){
                        document.getElementById('input-pro').value=this.state.proTeam;
                        document.getElementById('input-con').value=this.state.conTeam;
                        document.getElementById('input-topic').value=this.state.topic;
                        this.renderRoundsList();
                    }
                    this.showToast(this.t('imported'));
                    this.closeModal('settings-modal');
                }else throw new Error('err');
            }catch(err){ this.showToast('导入失败:格式错误','error'); }
        };
        r.readAsText(f); i.value='';
    }
};

window.addEventListener('DOMContentLoaded',()=>{ app.init(); });
</script>
</body>
</html>
